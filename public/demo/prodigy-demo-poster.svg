  <text x="960" y="620" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="600" fill="#0f1729">Product walkthrough</text>
  <text x="960" y="680" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#64748b">Press play to watch</text>
