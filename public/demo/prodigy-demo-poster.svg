<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Prodigy product walkthrough preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f8f8"/>
      <stop offset="55%" style="stop-color:#e6f4f2"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
